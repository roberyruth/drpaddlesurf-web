<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-i18n="reservar_meta_titulo">Reservar | DR Paddle Surf</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<!-- Flatpickr -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Inter,sans-serif;
background:#ffffff;
color:#0a1a2a;
overflow-x:hidden;
}

/* NAV GENERAL */
.nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.55);
    z-index: 999;
}

.nav-logo img {
    height: 55px;
}

/* HAMBURGUESA PRO */
.nav-toggle {
    width: 32px;
    height: 26px;
    display: none;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
}

.nav-toggle span {
    display: block;
    height: 4px;
    background: #0a1a2a;
    border-radius: 4px;
    transition: 0.3s;
}

/* ANIMACIÓN HAMBURGUESA → X */
.nav-toggle.active span:nth-child(1) {
    transform: translateY(11px) rotate(45deg);
}
.nav-toggle.active span:nth-child(2) {
    opacity: 0;
}
.nav-toggle.active span:nth-child(3) {
    transform: translateY(-11px) rotate(-45deg);
}

/* OVERLAY OSCURO */
.nav-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: rgba(0,0,0,0.45);
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    z-index: 998;
}

/* MENÚ DESLIZABLE PRO */
.nav-menu {
    position: fixed;
    top: 0;
    right: -280px;
    width: 280px;
    height: 100vh;
    background: white;
    box-shadow: -2px 0 12px rgba(0,0,0,0.15);
    padding: 80px 25px;
    display: flex;
    flex-direction: column;
    gap: 25px;
    transition: 0.35s ease;
    z-index: 9999;
}

.nav-menu a {
    font-size: 22px;
    text-decoration: none;
    color: #0a1a2a;
    font-weight: 700;
}

.nav-menu select {
    margin-top: 20px;
    padding: 10px;
    font-size: 16px;
}

/* BOTÓN CERRAR */
.nav-close {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 32px;
    cursor: pointer;
}

/* IDIOMAS ESCRITORIO */
.nav-lang-desktop {
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* RESPONSIVE NAV */
@media(max-width: 900px) {
    .nav-toggle {
        display: flex;
    }

    .nav-lang-desktop {
        display: none;
    }
}

/* FORMULARIO */
.container {
    max-width: 700px;
    margin: auto;
    padding: 120px 20px 40px;
}

h2{
text-align:center;
font-size:clamp(28px,5vw,42px);
margin-bottom:30px;
font-weight:800;
}

label{
font-weight:600;
margin-bottom:6px;
display:block;
}

input, select {
    width: 100%;
    padding: 14px;
    margin-bottom: 18px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 16px;
    background: #009dff;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 20px;
    cursor: pointer;
    font-weight:700;
}

button:hover {
    background: #007acc;
}

/* Calendario bonito */
.flatpickr-calendar {
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}
.flatpickr-day.today {
    background: #009dff !important;
    color: white !important;
    border-radius: 8px;
}
.flatpickr-day.selected {
    background: #007acc !important;
    color: white !important;
    border-radius: 8px;
}
</style>
</head>

<body>

<!-- NAV PRO -->
<nav class="nav">
    <a href="index.html" class="nav-logo">
        <img src="logotipo.png" alt="DR Paddle Surf">
    </a>

    <div class="nav-toggle" id="nav-toggle">
        <span></span><span></span><span></span>
    </div>

    <div class="nav-overlay" id="nav-overlay"></div>

    <div class="nav-menu" id="nav-menu">
        <div class="nav-close" id="nav-close">✕</div>

        <a href="index.html" data-i18n="menu_inicio">Inicio</a>
        <a href="cursos.html" data-i18n="menu_cursos">Cursos</a>
        <a href="alquiler.html" data-i18n="menu_alquiler">Alquiler</a>
        <a href="campamentos.html" data-i18n="menu_campamentos">Campamentos</a>
        <a href="grupos.html" data-i18n="menu_grupos">Grupos</a>

        <select id="language-selector-mobile">
            <option value="es">🇪🇸 ES</option>
            <option value="en">🇬🇧 EN</option>
            <option value="fr">🇫🇷 FR</option>
            <option value="de">🇩🇪 DE</option>
            <option value="it">🇮🇹 IT</option>
        </select>
    </div>

    <select id="language-selector" class="nav-lang-desktop">
        <option value="es">🇪🇸 ES</option>
        <option value="en">🇬🇧 EN</option>
        <option value="fr">🇫🇷 FR</option>
        <option value="de">🇩🇪 DE</option>
        <option value="it">🇮🇹 IT</option>
    </select>
</nav>

<!-- FORMULARIO -->
<div class="container">
    <h2 data-i18n="reservar_titulo">Reserva tu experiencia</h2>

    <label data-i18n="reservar_nombre_label">Nombre</label>
    <input type="text" id="nombre" data-i18n-placeholder="reservar_nombre_placeholder" placeholder="Tu nombre">

    <label data-i18n="reservar_telefono_label">Teléfono</label>
    <input type="text" id="telefono" data-i18n-placeholder="reservar_telefono_placeholder" placeholder="Tu teléfono">

    <label data-i18n="reservar_actividad_label">Actividad</label>
    <select id="actividad">
        <option value="Bautismo Paddle Surf" data-i18n="act_bautismo">Bautismo Paddle Surf</option>
        <option value="Iniciación Nivel 2" data-i18n="act_n2">Iniciación Nivel 2</option>
        <option value="Iniciación Nivel 3" data-i18n="act_n3">Iniciación Nivel 3</option>
        <option value="Alquiler 1h" data-i18n="act_alq1">Alquiler 1h</option>
        <option value="Alquiler 2h" data-i18n="act_alq2">Alquiler 2h</option>
        <option value="Alquiler 3h" data-i18n="act_alq3">Alquiler 3h</option>
        <option value="King Paddle" data-i18n="act_king">King Paddle</option>
        <option value="Campamento de Verano" data-i18n="act_camp">Campamento de Verano</option>
        <option value="Grupo / Team Building" data-i18n="act_grupo">Grupo / Team Building</option>
    </select>

    <label data-i18n="reservar_fecha_label">Fecha</label>
    <input type="text" id="fecha" data-i18n-placeholder="reservar_fecha_placeholder" placeholder="Selecciona una fecha">

    <label data-i18n="reservar_hora_label">Hora</label>
    <input type="time" id="hora">

    <label data-i18n="reservar_personas_label">Número de personas</label>
    <input type="number" id="personas" min="1" value="1">

    <button onclick="enviarReserva()" data-i18n="reservar_boton">Enviar reserva por WhatsApp</button>
</div>

<!-- SCRIPT MENÚ PRO -->
<script>
const navToggle = document.getElementById("nav-toggle");
const navMenu = document.getElementById("nav-menu");
const navOverlay = document.getElementById("nav-overlay");
const navClose = document.getElementById("nav-close");

function openMenu() {
    navMenu.style.right = "0px";
    navOverlay.style.opacity = "1";
    navOverlay.style.pointerEvents = "auto";
    navToggle.classList.add("active");
}

function closeMenu() {
    navMenu.style.right = "-280px";
    navOverlay.style.opacity = "0";
    navOverlay.style.pointerEvents = "none";
    navToggle.classList.remove("active");
}

navToggle.addEventListener("click", () => {
    const isOpen = navMenu.style.right === "0px";
    isOpen ? closeMenu() : openMenu();
});

navClose.addEventListener("click", closeMenu);
navOverlay.addEventListener("click", closeMenu);

/* Sincronizar idiomas móvil ↔ escritorio */
const langDesktop = document.getElementById("language-selector");
const langMobile = document.getElementById("language-selector-mobile");

langMobile.addEventListener("change", () => {
    langDesktop.value = langMobile.value;
    langDesktop.dispatchEvent(new Event("change"));
});

langDesktop.addEventListener("change", () => {
    langMobile.value = langDesktop.value;
});
</script>

<!-- SCRIPT MULTILENGUAJE -->
<script>
document.getElementById("language-selector").addEventListener("change", function() {
    const lang = this.value;
    localStorage.setItem("lang", lang);
    loadLanguage(lang);
});

function loadLanguage(lang) {
    fetch(lang + ".json")
        .then(response => response.json())
        .then(data => {
            document.querySelectorAll("[data-i18n]").forEach(el => {
                const key = el.getAttribute("data-i18n");
                if (data[key]) el.innerHTML = data[key];
            });

            document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
                const key = el.getAttribute("data-i18n-placeholder");
                if (data[key]) el.placeholder = data[key];
            });
        });
}

const savedLang = localStorage.getItem("lang") || "es";
document.getElementById("language-selector").value = savedLang;
loadLanguage(savedLang);
</script>

<!-- CALENDARIO -->
<script>
flatpickr("#fecha", {
    minDate: "today",
    dateFormat: "Y-m-d",
    locale: "es"
});
</script>

<!-- WHATSAPP -->
<script>
function enviarReserva() {
    let nombre = document.getElementById("nombre").value;
    let telefono = document.getElementById("telefono").value;
    let actividad = document.getElementById("actividad").value;
    let fecha = document.getElementById("fecha").value;
    let hora = document.getElementById("hora").value;
    let personas = document.getElementById("personas").value;

    let mensaje = `Hola! Soy ${nombre}. Quiero reservar: ${actividad}. Fecha: ${fecha}. Hora: ${hora}. Personas: ${personas}. Mi teléfono: ${telefono}`;

    window.open(`https://wa.me/34603750739?text=${encodeURIComponent(mensaje)}`);
}
</script>

</body>
</html>
